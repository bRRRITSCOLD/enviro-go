name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -v -race -count=1 ./...

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  notify-module-proxy:
    name: Notify Go Module Proxy
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Request module proxy indexing
        run: |
          MODULE="github.com/bRRRITSCOLD/enviro-go"
          VERSION="${{ github.ref_name }}"
          curl -sSf "https://sum.golang.org/lookup/${MODULE}@${VERSION}" > /dev/null || true
          curl -sSf "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" > /dev/null || true
          echo "Module proxy notified for ${MODULE}@${VERSION}"
